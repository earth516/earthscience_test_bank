<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SJ 문제은행</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #10b981;
      --bg-start: #f0f4ff;
      --bg-end: #e0e7ff;
      --text: #1e293b;
      --text-light: #64748b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
      --correct: #10b981;
      --wrong: #ef4444;
      --partial: #f59e0b;
    }
    body {
      font-family: 'Gowun Dodum', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; padding: 30px 20px 20px; }
    .logo-wrap {
      display: inline-block;
      width: 120px; height: 120px;
      margin-bottom: 12px;
      animation: bounce 3s ease-in-out infinite;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .title {
      font-family: 'Jua', sans-serif;
      font-size: 36px;
      color: var(--text);
      letter-spacing: -1px;
    }
    .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 4px;
      letter-spacing: 2px;
    }
    .card {
      background: var(--card-bg);
      padding: 32px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
    }
    h2 { font-size: 22px; margin-bottom: 8px; font-family: 'Jua', sans-serif; }
    h3 { font-size: 18px; margin-bottom: 12px; }
    input {
      width: 100%;
      font-size: 17px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-family: inherit;
      transition: border-color 0.2s;
      margin-top: 8px;
    }
    input:focus { outline: none; border-color: var(--primary); }
    button {
      font-family: inherit;
      font-size: 16px;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 12px;
    }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-light);
      padding: 10px 18px;
      font-size: 14px;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-back {
      background: transparent;
      color: var(--text-light);
      padding: 8px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .btn-back:hover { color: var(--primary); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }
    .block {
      background: white;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 22px 16px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .block:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .block-title {
      font-weight: bold;
      font-size: 16px;
      color: var(--text);
      font-family: 'Jua', sans-serif;
    }
    .block-count {
      font-size: 13px;
      color: var(--text-light);
      background: #f1f5f9;
      padding: 3px 10px;
      border-radius: 12px;
    }
    /* 경로 (breadcrumb) */
    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border-radius: 12px;
      font-size: 14px;
      color: var(--primary-dark);
      margin-bottom: 16px;
      font-weight: bold;
    }
    .breadcrumb-sep { color: var(--text-light); opacity: 0.5; }
    .breadcrumb-icon { font-size: 16px; }
    /* 인사 */
    .greeting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .greeting-text { font-size: 18px; }
    .greeting-text strong { color: var(--primary); }
    /* 진행 */
    .progress-bar {
      background: #f1f5f9;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      height: 100%;
      transition: width 0.3s;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .concept-title {
      font-family: 'Jua', sans-serif;
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px dashed var(--border);
    }
    .question-img {
      max-width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid var(--border);
    }
    /* 빈칸 입력 영역 */
    .blank-inputs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
    .blank-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .blank-label {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-family: 'Jua', sans-serif;
    }
    .blank-row input { margin-top: 0; }
    /* 결과 */
    .result-msg {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
    }
    .result-correct {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid var(--correct);
    }
    .result-wrong {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid var(--wrong);
    }
    .result-partial {
      background: #fef3c7;
      color: #92400e;
      border-left: 4px solid var(--partial);
    }
    .result-icon { font-size: 22px; font-weight: bold; margin-right: 8px; }
    .explanation { margin-top: 8px; font-size: 14px; opacity: 0.85; }
    .answer-detail {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 8px;
      font-size: 14px;
    }
    .answer-detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .answer-mark { font-weight: bold; min-width: 20px; }
    .answer-mark.ok { color: var(--correct); }
    .answer-mark.no { color: var(--wrong); }
    /* 결과 화면 */
    .summary { text-align: center; padding: 20px; }
    .summary-score {
      font-family: 'Jua', sans-serif;
      font-size: 56px;
      color: var(--primary);
      margin: 16px 0;
    }
    .summary-label { color: var(--text-light); font-size: 16px; }
    .hidden { display: none !important; }
    .msg {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 12px;
      min-height: 20px;
    }
    .msg.error { color: var(--wrong); }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .actions button { flex: 1; min-width: 120px; }
    /* 로딩 스피너 */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-overlay {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-light);
      font-size: 15px;
    }
    .loading-overlay .spinner {
      width: 28px;
      height: 28px;
      display: block;
      margin: 0 auto 12px;
    }
    /* 검색창 */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-box input {
      padding-left: 44px;
      margin-top: 0;
      background: #f8fafc;
    }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
      z-index: 1;
    }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #e2e8f0;
      color: var(--text-light);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      border: none;
      padding: 0;
      font-weight: bold;
    }
    .search-clear:hover { background: #cbd5e1; }
    .search-result-label {
      color: var(--primary);
      font-size: 14px;
      font-weight: bold;
      margin-top: 8px;
      margin-bottom: 4px;
    }
    .section-divider {
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
      color: var(--text-light);
      font-size: 14px;
      font-weight: bold;
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 20px; }
      .title { font-size: 28px; }
      .logo-wrap { width: 90px; height: 90px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .block { padding: 16px 12px; }
      .breadcrumb { font-size: 12px; padding: 10px 12px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="SJ 문제은행" onerror="this.style.display='none'">
    </div>
    <div class="title">SJ 문제은행</div>
    <div class="subtitle">EARTH SCIENCE</div>
  </div>

  <!-- 로그인 -->
  <div id="loginScreen" class="card">
    <h2>👋 어서오세요!</h2>
    <p style="color: var(--text-light); margin-top: 4px;">학번을 입력하고 시작해요</p>
    <input type="text" id="studentIdInput" placeholder="예: 20101" onkeypress="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">입장하기</button>
    <p id="loginMsg" class="msg"></p>
  </div>

  <!-- 소단원 선택 -->
  <div id="subUnitScreen" class="card hidden">
    <div class="greeting">
      <div class="greeting-text"><strong id="studentName"></strong>님, 반가워요!</div>
      <button class="btn-secondary" onclick="logout()">로그아웃</button>
    </div>
    
    <!-- 검색창 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="개념 검색 (예: 오존, 염분)" oninput="handleSearch()">
      <button id="searchClearBtn" class="search-clear hidden" onclick="clearSearch()">✕</button>
    </div>
    
    <!-- 검색 결과 영역 -->
    <div id="searchResultArea" class="hidden">
      <div class="search-result-label" id="searchResultLabel"></div>
      <div id="searchResultGrid" class="grid"></div>
    </div>
    
    <!-- 소단원 영역 -->
    <div id="subUnitArea">
      <p style="color: var(--text-light);">학습할 소단원을 선택하세요</p>
      <div id="subUnitLoading" class="loading-overlay hidden">
        <div class="spinner"></div>
        📚 문제를 불러오는 중...
      </div>
      <div id="subUnitGrid" class="grid"></div>
    </div>
  </div>

  <!-- 관련개념 선택 -->
  <div id="conceptScreen" class="card hidden">
    <button class="btn-back" onclick="goToSubUnitScreen()">← 소단원 선택으로</button>
    <div class="breadcrumb" id="conceptBreadcrumb"></div>
    <p style="color: var(--text-light);">학습할 개념을 선택하세요 (가나다순)</p>
    <div id="conceptGrid" class="grid"></div>
  </div>

  <!-- 문제 풀이 -->
  <div id="quizScreen" class="card hidden">
    <button class="btn-back" onclick="quitQuiz()">← 개념 선택으로</button>
    <div class="breadcrumb" id="quizBreadcrumb"></div>
    <div class="progress-text">
      <span id="progressText"></span>
      <span id="scoreText"></span>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
    <h3 class="concept-title" id="conceptText"></h3>
    <img id="questionImg" class="question-img hidden" onerror="this.classList.add('hidden')">
    <div id="quizArea"></div>
    <div id="resultMsg"></div>
    <div class="actions">
      <button id="nextBtn" class="btn-primary hidden">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="resultScreen" class="card hidden">
    <div class="summary">
      <h2>🎉 수고하셨어요!</h2>
      <div class="summary-score"><span id="scoreNum">0</span> / <span id="totalNum">0</span></div>
      <div class="summary-label" id="scorePercent"></div>
      <div class="actions" style="max-width:400px; margin: 24px auto 0;">
        <button class="btn-primary" onclick="goToSubUnitScreen()">소단원 선택으로</button>
        <button class="btn-secondary" onclick="retryQuiz()">다시 풀기</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxsmVMGmiB9CmQ_smkRWffgMhdPslZl7rYl5eXAbNEEmsz96GCN_XX4PlFEZUwLulFi0A/exec';
  const IMAGE_BASE = 'images/';
  
  // 대단원 아이콘 (문제ID 앞부분 기준)
  // 새 방식: atm/ocn/geo/spc  (옛 방식 A/B/C/D 도 같이 지원)
  const PART_ICON = {
    'atm': '🌫️', 'ocn': '🌊', 'geo': '⛰️', 'spc': '🌌',
    'A': '🌫️', 'B': '🌊', 'C': '⛰️', 'D': '🌌'
  };

  // 문제ID에서 대단원 코드 뽑기
  //  atm-001 → atm,  A-01-001 → A
  function partCode(id) {
    const s = String(id || '').trim();
    if (!s) return '';
    const first = s.split('-')[0].toLowerCase();   // 첫 구획 (예: atm, a)
    if (PART_ICON[first]) return first;            // atm/ocn/geo/spc 매칭
    return s.charAt(0).toUpperCase();              // 옛 방식 A/B/C/D
  }
  function partIcon(id) {
    return PART_ICON[partCode(id)] || '📘';
  }
  
  let currentStudent = null;
  let allQuestions = [];
  let currentSubUnit = null;
  let currentConcept = null;
  let quizQuestions = [];
  let currentIndex = 0;
  let correctCount = 0;
  
  async function apiCall(params) {
    const url = API_URL + '?' + new URLSearchParams(params).toString();
    const response = await fetch(url);
    return await response.json();
  }
  
  function showScreen(id) {
    ['loginScreen', 'subUnitScreen', 'conceptScreen', 'quizScreen', 'resultScreen']
      .forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  // ===== 로그인 (최적화: 1번 호출 + 캐싱 + 로딩 표시) =====
  async function login() {
    const id = document.getElementById('studentIdInput').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!id) { msg.textContent = '학번을 입력해주세요'; msg.className = 'msg error'; return; }
    
    // 로그인 버튼 비활성화 + 스피너 표시
    const loginBtn = document.querySelector('#loginScreen .btn-primary');
    loginBtn.disabled = true;
    msg.innerHTML = '<span class="spinner"></span>입장하는 중...';
    msg.className = 'msg';
    
    // ① 캐시된 문제 데이터 먼저 확인 (즉시 표시)
    const cached = localStorage.getItem('sj_questions_cache');
    let cachedQuestions = null;
    if (cached) {
      try { cachedQuestions = JSON.parse(cached); } catch (e) {}
    }
    
    try {
      // ② API 한 번에 호출 (로그인 + 문제 동시)
      const result = await apiCall({ action: 'loginAndGetData', studentId: id });
      
      if (result.status === 'ok') {
        currentStudent = { 학번: result.학번, 이름: result.이름 };
        allQuestions = (result.questions || []).filter(q => q.문제ID);
        
        // 캐시 저장 (다음 로그인 시 즉시 표시용)
        try {
          localStorage.setItem('sj_questions_cache', JSON.stringify(allQuestions));
        } catch (e) {}
        
        document.getElementById('studentName').textContent = result.이름;
        renderSubUnitGrid();
        showScreen('subUnitScreen');
        msg.innerHTML = '';
      } else {
        msg.textContent = '❌ ' + result.message;
        msg.className = 'msg error';
        loginBtn.disabled = false;
      }
    } catch (err) {
      // ③ 서버 실패해도 캐시가 있으면 그걸로 진행
      if (cachedQuestions && cachedQuestions.length > 0) {
        currentStudent = { 학번: id, 이름: id + ' (오프라인)' };
        allQuestions = cachedQuestions;
        document.getElementById('studentName').textContent = currentStudent.이름;
        renderSubUnitGrid();
        showScreen('subUnitScreen');
        msg.innerHTML = '';
      } else {
        msg.textContent = '⚠️ 서버 연결 실패';
        msg.className = 'msg error';
        loginBtn.disabled = false;
      }
    }
  }
  
  function logout() {
    currentStudent = null;
    allQuestions = [];
    document.getElementById('studentIdInput').value = '';
    document.getElementById('loginMsg').textContent = '';
    const loginBtn = document.querySelector('#loginScreen .btn-primary');
    if (loginBtn) loginBtn.disabled = false;
    showScreen('loginScreen');
  }
  
  async function loadQuestions() {
    const result = await apiCall({ action: 'getQuestions' });
    if (result.status === 'ok') {
      allQuestions = result.data.filter(q => q.문제ID);
    }
  }
  
  // ===== 소단원 블록 (시트 순서대로) =====
  function renderSubUnitGrid() {
    const grid = document.getElementById('subUnitGrid');
    grid.innerHTML = '';
    
    // 시트 순서대로 unique 소단원 추출
    const seen = new Set();
    const subUnits = [];
    allQuestions.forEach(q => {
      if (q.소단원 && !seen.has(q.소단원)) {
        seen.add(q.소단원);
        subUnits.push({
          이름: q.소단원,
          대단원: q.대단원,
          중단원: q.중단원,
          코드: partCode(q.문제ID)
        });
      }
    });
    
    if (subUnits.length === 0) {
      grid.innerHTML = '<div class="empty-state">아직 문제가 없어요</div>';
      return;
    }
    
    subUnits.forEach(su => {
      const count = allQuestions.filter(q => q.소단원 === su.이름).length;
      const icon = PART_ICON[su.코드] || '📘';
      const block = document.createElement('div');
      block.className = 'block';
      block.innerHTML = `
        <div style="font-size:32px;">${icon}</div>
        <div class="block-title">${su.이름}</div>
        <div style="font-size:11px; color:var(--text-light);">${su.대단원} › ${su.중단원}</div>
        <div class="block-count">${count}문제</div>
      `;
      block.onclick = () => selectSubUnit(su);
      grid.appendChild(block);
    });
  }
  
  function goToSubUnitScreen() {
    currentSubUnit = null;
    currentConcept = null;
    renderSubUnitGrid();
    // 검색창도 초기화
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.value = '';
      handleSearch();
    }
    showScreen('subUnitScreen');
  }
  
  // ===== 🔍 검색 기능 =====
  function handleSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    const clearBtn = document.getElementById('searchClearBtn');
    const resultArea = document.getElementById('searchResultArea');
    const subUnitArea = document.getElementById('subUnitArea');
    
    if (!keyword) {
      // 검색어 없으면 → 소단원 보이기
      clearBtn.classList.add('hidden');
      resultArea.classList.add('hidden');
      subUnitArea.classList.remove('hidden');
      return;
    }
    
    clearBtn.classList.remove('hidden');
    
    // 관련개념에 검색어 포함된 문제 찾기
    const lowerKeyword = keyword.toLowerCase();
    const matched = allQuestions.filter(q => 
      q.관련개념 && String(q.관련개념).toLowerCase().includes(lowerKeyword)
    );
    
    // 관련개념별로 그룹
    const conceptMap = {};
    matched.forEach(q => {
      if (!conceptMap[q.관련개념]) {
        conceptMap[q.관련개념] = {
          개념: q.관련개념,
          소단원: q.소단원,
          중단원: q.중단원,
          대단원: q.대단원,
          코드: partCode(q.문제ID),
          문제들: []
        };
      }
      conceptMap[q.관련개념].문제들.push(q);
    });
    
    const conceptGroups = Object.values(conceptMap);
    // 가나다순
    conceptGroups.sort((a, b) => String(a.개념).localeCompare(String(b.개념), 'ko'));
    
    // 결과 표시
    subUnitArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    
    const label = document.getElementById('searchResultLabel');
    const grid = document.getElementById('searchResultGrid');
    grid.innerHTML = '';
    
    if (conceptGroups.length === 0) {
      label.textContent = `"${keyword}" 검색 결과가 없어요`;
      grid.innerHTML = '<div class="empty-state">😢 해당 개념이 없어요. 다른 키워드로 검색해보세요.</div>';
      return;
    }
    
    label.textContent = `"${keyword}" 검색 결과: ${conceptGroups.length}개 개념, ${matched.length}문제`;
    
    conceptGroups.forEach(group => {
      const icon = PART_ICON[group.코드] || '📘';
      const block = document.createElement('div');
      block.className = 'block';
      block.innerHTML = `
        <div style="font-size:28px;">${icon}</div>
        <div class="block-title">${highlightKeyword(group.개념, keyword)}</div>
        <div style="font-size:11px; color:var(--text-light);">${group.소단원}</div>
        <div class="block-count">${group.문제들.length}문제</div>
      `;
      block.onclick = () => startQuizFromSearch(group);
      grid.appendChild(block);
    });
  }
  
  function highlightKeyword(text, keyword) {
    if (!keyword) return text;
    const regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return String(text).replace(regex, '<span style="background:#fef08a; padding:0 2px; border-radius:3px;">$1</span>');
  }
  
  function clearSearch() {
    document.getElementById('searchInput').value = '';
    handleSearch();
    document.getElementById('searchInput').focus();
  }
  
  // 검색 결과에서 바로 퀴즈 시작
  function startQuizFromSearch(group) {
    // 가상의 소단원 정보 설정
    currentSubUnit = {
      이름: group.소단원,
      대단원: group.대단원,
      중단원: group.중단원,
      코드: group.코드
    };
    startQuiz(group.개념);
  }
  
  // ===== 관련개념 블록 (가나다순) =====
  function selectSubUnit(su) {
    currentSubUnit = su;
    const icon = PART_ICON[su.코드] || '📘';
    document.getElementById('conceptBreadcrumb').innerHTML = `
      <span class="breadcrumb-icon">${icon}</span>
      <span>${su.대단원}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${su.중단원}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${su.이름}</span>
    `;
    renderConceptGrid();
    showScreen('conceptScreen');
  }
  
  function renderConceptGrid() {
    const grid = document.getElementById('conceptGrid');
    grid.innerHTML = '';
    const subQs = allQuestions.filter(q => q.소단원 === currentSubUnit.이름);
    const concepts = [...new Set(subQs.map(q => q.관련개념))].filter(Boolean);
    concepts.sort((a, b) => String(a).localeCompare(String(b), 'ko'));
    
    if (concepts.length === 0) {
      grid.innerHTML = '<div class="empty-state">아직 개념이 등록되지 않았어요</div>';
      return;
    }
    
    concepts.forEach(concept => {
      const cQs = subQs.filter(q => q.관련개념 === concept);
      const block = document.createElement('div');
      block.className = 'block';
      block.innerHTML = `
        <div class="block-title">${concept}</div>
        <div class="block-count">${cQs.length}문제</div>
      `;
      block.onclick = () => startQuiz(concept);
      grid.appendChild(block);
    });
  }
  
  // ===== 퀴즈 =====
  function startQuiz(concept) {
    currentConcept = concept;
    const qs = allQuestions.filter(q => 
      q.소단원 === currentSubUnit.이름 && q.관련개념 === concept
    );
    quizQuestions = shuffle(qs);
    currentIndex = 0;
    correctCount = 0;
    
    const icon = PART_ICON[currentSubUnit.코드] || '📘';
    document.getElementById('quizBreadcrumb').innerHTML = `
      <span class="breadcrumb-icon">${icon}</span>
      <span>${currentSubUnit.대단원}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${currentSubUnit.중단원}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${currentSubUnit.이름}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${concept}</span>
    `;
    
    showScreen('quizScreen');
    showQuestion();
  }
  
  function retryQuiz() {
    if (currentSubUnit && currentConcept) startQuiz(currentConcept);
    else goToSubUnitScreen();
  }
  
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  
  // ===== 정답 파싱 =====
  // "하강|오존" → [["하강"], ["오존"]]  (빈칸 2개, 각 1개 정답)
  // "9.8/9.8m/s²" → [["9.8", "9.8m/s²"]]  (빈칸 1개, 정답 후보 2개)
  // "하강|오존/O3" → [["하강"], ["오존", "O3"]]  (빈칸 2개, 2번째 칸 정답 2개)
  function parseAnswer(answerStr) {
    return String(answerStr).split('|').map(blank => 
      blank.split('/').map(s => s.trim()).filter(Boolean)
    );
  }
  
  function showQuestion() {
    const q = quizQuestions[currentIndex];
    const total = quizQuestions.length;
    const num = currentIndex + 1;
    
    document.getElementById('progressText').textContent = `${num} / ${total}`;
    document.getElementById('scoreText').textContent = `맞힌 개수: ${correctCount}`;
    document.getElementById('progressFill').style.width = `${(num / total) * 100}%`;
    document.getElementById('conceptText').textContent = '💡 ' + (q.관련개념 || '');
    
    // 이미지
    const img = document.getElementById('questionImg');
    let src = q.문제그림URL;
    if (src) {
      if (!src.startsWith('http') && !src.startsWith('images/')) src = IMAGE_BASE + src;
      img.src = src;
      img.classList.remove('hidden');
    } else if (q.문제ID) {
      img.src = IMAGE_BASE + q.문제ID + '.png';
      img.classList.remove('hidden');
    } else {
      img.classList.add('hidden');
    }
    
    // 빈칸 개수만큼 입력칸 생성
    const correctParsed = parseAnswer(q.정답);
    const blankCount = correctParsed.length;
    
    const area = document.getElementById('quizArea');
    area.innerHTML = '';
    
    const wrap = document.createElement('div');
    wrap.className = 'blank-inputs';
    
    for (let i = 0; i < blankCount; i++) {
      const row = document.createElement('div');
      row.className = 'blank-row';
      
      if (blankCount > 1) {
        const label = document.createElement('div');
        label.className = 'blank-label';
        // ①②③④⑤
        const circled = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
        label.textContent = circled[i] || (i+1);
        row.appendChild(label);
      }
      
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'blank-input';
      input.dataset.idx = i;
      input.placeholder = blankCount > 1 ? `${i+1}번째 빈칸` : '정답을 입력하세요';
      input.onkeypress = (e) => {
        if (e.key === 'Enter') {
          // 마지막 칸이면 제출, 아니면 다음 칸으로
          const inputs = document.querySelectorAll('.blank-input');
          if (i === inputs.length - 1) submitAnswer();
          else inputs[i+1].focus();
        }
      };
      row.appendChild(input);
      wrap.appendChild(row);
    }
    
    area.appendChild(wrap);
    
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = '제출';
    btn.onclick = submitAnswer;
    area.appendChild(btn);
    
    document.getElementById('resultMsg').innerHTML = '';
    document.getElementById('nextBtn').classList.add('hidden');
    
    setTimeout(() => {
      const firstInput = document.querySelector('.blank-input');
      if (firstInput) firstInput.focus();
    }, 200);
  }
  
  function normalize(s) {
    if (s === null || s === undefined) return '';
    return String(s).trim().replace(/\s+/g, '').toLowerCase();
  }
  
  function normalizeForKor(s) {
    let str = normalize(s);
    if (/^[ㄱ-ㅎ]+$/.test(str)) return str.split('').sort().join('');
    return str;
  }
  
  function checkBlank(studentAns, candidates) {
    const sAns = normalizeForKor(studentAns);
    return candidates.map(c => normalizeForKor(c)).includes(sAns);
  }
  
  async function submitAnswer() {
    const inputs = document.querySelectorAll('.blank-input');
    const q = quizQuestions[currentIndex];
    const correctParsed = parseAnswer(q.정답);
    
    // 빈칸 다 입력했는지 체크
    const answers = [];
    for (let i = 0; i < inputs.length; i++) {
      const v = inputs[i].value.trim();
      if (!v) {
        inputs[i].focus();
        return; // 안 채운 칸이 있으면 거기로 포커스
      }
      answers.push(v);
    }
    
    // 각 빈칸 채점
    const results = answers.map((a, i) => checkBlank(a, correctParsed[i]));
    const correctNum = results.filter(r => r).length;
    const totalNum = results.length;
    const allCorrect = correctNum === totalNum;
    
    if (allCorrect) correctCount++;
    document.getElementById('scoreText').textContent = `맞힌 개수: ${correctCount}`;
    
    // 결과 표시
    const msgEl = document.getElementById('resultMsg');
    let resultHtml = '';
    
    if (allCorrect) {
      resultHtml = `<div class="result-msg result-correct">
        <span class="result-icon">✓</span> 정답이에요!
        ${q.해설 ? `<div class="explanation">${q.해설}</div>` : ''}
      </div>`;
    } else if (correctNum > 0) {
      // 부분 정답 (틀린 걸로 처리하지만 몇 개 맞췄는지 표시)
      let detailHtml = '<div class="answer-detail">';
      results.forEach((r, i) => {
        const correctShow = correctParsed[i].join(' 또는 ');
        detailHtml += `<div class="answer-detail-row">
          <span class="answer-mark ${r ? 'ok' : 'no'}">${r ? '✓' : '✗'}</span>
          <span>${i+1}번 빈칸: <strong>${correctShow}</strong> (입력: ${answers[i]})</span>
        </div>`;
      });
      detailHtml += '</div>';
      resultHtml = `<div class="result-msg result-partial">
        <span class="result-icon">△</span> 아쉬워요! ${totalNum}개 중 ${correctNum}개 맞췄어요.
        ${detailHtml}
        ${q.해설 ? `<div class="explanation">${q.해설}</div>` : ''}
      </div>`;
    } else {
      let detailHtml = '<div class="answer-detail">';
      correctParsed.forEach((cands, i) => {
        detailHtml += `<div class="answer-detail-row">
          <span class="answer-mark no">✗</span>
          <span>${i+1}번 빈칸: <strong>${cands.join(' 또는 ')}</strong></span>
        </div>`;
      });
      detailHtml += '</div>';
      resultHtml = `<div class="result-msg result-wrong">
        <span class="result-icon">✗</span> 다시 한번 풀어볼까요?
        ${detailHtml}
        ${q.해설 ? `<div class="explanation">${q.해설}</div>` : ''}
      </div>`;
    }
    
    msgEl.innerHTML = resultHtml;
    
    // 저장 (학생답안은 콤마로 연결)
    apiCall({
      action: 'saveAnswer',
      학번: currentStudent.학번,
      이름: currentStudent.이름,
      문제ID: q.문제ID,
      학생답안: answers.join(' | '),
      정답여부: allCorrect ? 'true' : 'false'
    }).catch(err => console.error('저장 실패:', err));
    
    // 입력 비활성화
    inputs.forEach(i => i.disabled = true);
    document.querySelectorAll('#quizArea button').forEach(b => b.disabled = true);
    
    const nextBtn = document.getElementById('nextBtn');
    if (currentIndex < quizQuestions.length - 1) {
      nextBtn.textContent = '다음 문제 →';
      nextBtn.onclick = nextQuestion;
    } else {
      nextBtn.textContent = '결과 보기 🎉';
      nextBtn.onclick = showResult;
    }
    nextBtn.classList.remove('hidden');
  }
  
  function nextQuestion() {
    currentIndex++;
    showQuestion();
  }
  
  function showResult() {
    document.getElementById('scoreNum').textContent = correctCount;
    document.getElementById('totalNum').textContent = quizQuestions.length;
    const pct = Math.round((correctCount / quizQuestions.length) * 100);
    let comment = '';
    if (pct === 100) comment = '🌟 완벽해요!';
    else if (pct >= 80) comment = '👏 잘했어요!';
    else if (pct >= 60) comment = '💪 조금만 더!';
    else comment = '📚 다시 한번 풀어볼까요?';
    document.getElementById('scorePercent').textContent = `${pct}% · ${comment}`;
    showScreen('resultScreen');
  }
  
  function quitQuiz() {
    if (currentIndex > 0 || correctCount > 0) {
      if (!confirm('정말 그만 푸시겠어요?')) return;
    }
    // 같은 소단원의 개념 선택 화면으로
    if (currentSubUnit) {
      renderConceptGrid();
      showScreen('conceptScreen');
    } else {
      goToSubUnitScreen();
    }
  }
</script>
