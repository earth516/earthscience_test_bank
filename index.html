<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SJ 문제은행</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #10b981;
      --bg-start: #f0f4ff;
      --bg-end: #e0e7ff;
      --text: #1e293b;
      --text-light: #64748b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
      --correct: #10b981;
      --wrong: #ef4444;
    }
    body {
      font-family: 'Gowun Dodum', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; padding: 30px 20px 20px; }
    .logo-wrap {
      display: inline-block;
      width: 120px; height: 120px;
      margin-bottom: 12px;
      animation: bounce 3s ease-in-out infinite;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .title {
      font-family: 'Jua', sans-serif;
      font-size: 36px;
      color: var(--text);
      letter-spacing: -1px;
    }
    .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 4px;
      letter-spacing: 2px;
    }
    .card {
      background: var(--card-bg);
      padding: 32px;
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
    }
    h2 { font-size: 22px; margin-bottom: 8px; font-family: 'Jua', sans-serif; }
    h3 { font-size: 18px; margin-bottom: 12px; }
    input {
      width: 100%;
      font-size: 17px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-family: inherit;
      transition: border-color 0.2s;
      margin-top: 12px;
    }
    input:focus { outline: none; border-color: var(--primary); }
    button {
      font-family: inherit;
      font-size: 16px;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 12px;
    }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-light);
      padding: 10px 18px;
      font-size: 14px;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-back {
      background: transparent;
      color: var(--text-light);
      padding: 8px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .btn-back:hover { color: var(--primary); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }
    .block {
      background: white;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 22px 16px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .block:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .block-icon { font-size: 36px; margin-bottom: 4px; }
    .block-title {
      font-weight: bold;
      font-size: 16px;
      color: var(--text);
      font-family: 'Jua', sans-serif;
    }
    .block-count {
      font-size: 13px;
      color: var(--text-light);
      background: #f1f5f9;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .block-part-A { background: linear-gradient(135deg, #fef3c7, #fde68a); border-color: #fcd34d; }
    .block-part-B { background: linear-gradient(135deg, #dbeafe, #bfdbfe); border-color: #93c5fd; }
    .block-part-C { background: linear-gradient(135deg, #fed7aa, #fdba74); border-color: #fb923c; }
    .block-part-D { background: linear-gradient(135deg, #e9d5ff, #d8b4fe); border-color: #c084fc; }
    .greeting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .greeting-text { font-size: 18px; }
    .greeting-text strong { color: var(--primary); }
    .progress-bar {
      background: #f1f5f9;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      height: 100%;
      transition: width 0.3s;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .sub-info { color: var(--text-light); font-size: 13px; margin-bottom: 8px; }
    .concept-title {
      font-family: 'Jua', sans-serif;
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px dashed var(--border);
    }
    .question-img {
      max-width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid var(--border);
    }
    .result-msg {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
    }
    .result-correct {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid var(--correct);
    }
    .result-wrong {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid var(--wrong);
    }
    .result-icon { font-size: 22px; font-weight: bold; margin-right: 8px; }
    .explanation { margin-top: 8px; font-size: 14px; opacity: 0.85; }
    .summary { text-align: center; padding: 20px; }
    .summary-score {
      font-family: 'Jua', sans-serif;
      font-size: 56px;
      color: var(--primary);
      margin: 16px 0;
    }
    .summary-label { color: var(--text-light); font-size: 16px; }
    .hidden { display: none !important; }
    .msg {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 12px;
      min-height: 20px;
    }
    .msg.error { color: var(--wrong); }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .actions button { flex: 1; min-width: 120px; }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 20px; }
      .title { font-size: 28px; }
      .logo-wrap { width: 90px; height: 90px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .block { padding: 16px 12px; }
      .block-icon { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="SJ 문제은행" onerror="this.style.display='none'">
    </div>
    <div class="title">SJ 문제은행</div>
    <div class="subtitle">EARTH SCIENCE</div>
  </div>

  <div id="loginScreen" class="card">
    <h2>👋 어서오세요!</h2>
    <p style="color: var(--text-light); margin-top: 4px;">학번을 입력하고 시작해요</p>
    <input type="text" id="studentIdInput" placeholder="예: 20101" onkeypress="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">입장하기</button>
    <p id="loginMsg" class="msg"></p>
  </div>

  <div id="partScreen" class="card hidden">
    <div class="greeting">
      <div class="greeting-text"><strong id="studentName"></strong>님, 반가워요!</div>
      <button class="btn-secondary" onclick="logout()">로그아웃</button>
    </div>
    <p style="color: var(--text-light);">학습할 단원을 선택하세요</p>
    <div id="partGrid" class="grid"></div>
  </div>

  <div id="conceptScreen" class="card hidden">
    <button class="btn-back" onclick="goToPartScreen()">← 단원 선택으로</button>
    <h2 id="conceptScreenTitle"></h2>
    <p style="color: var(--text-light);">학습할 개념을 선택하세요 (가나다순)</p>
    <div id="conceptGrid" class="grid"></div>
  </div>

  <div id="quizScreen" class="card hidden">
    <div class="progress-text">
      <span id="progressText"></span>
      <span id="scoreText"></span>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
    <div class="sub-info" id="subUnitText"></div>
    <h3 class="concept-title" id="conceptText"></h3>
    <img id="questionImg" class="question-img hidden" onerror="this.classList.add('hidden')">
    <div id="quizArea"></div>
    <div id="resultMsg"></div>
    <div class="actions">
      <button id="nextBtn" class="btn-primary hidden" onclick="nextQuestion()">다음 문제 →</button>
      <button class="btn-secondary" onclick="quitQuiz()">그만 풀기</button>
    </div>
  </div>

  <div id="resultScreen" class="card hidden">
    <div class="summary">
      <h2>🎉 수고하셨어요!</h2>
      <div class="summary-score"><span id="scoreNum">0</span> / <span id="totalNum">0</span></div>
      <div class="summary-label" id="scorePercent"></div>
      <div class="actions" style="max-width:400px; margin: 24px auto 0;">
        <button class="btn-primary" onclick="goToPartScreen()">단원 선택으로</button>
        <button class="btn-secondary" onclick="retryQuiz()">다시 풀기</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxsmVMGmiB9CmQ_smkRWffgMhdPslZl7rYl5eXAbNEEmsz96GCN_XX4PlFEZUwLulFi0A/exec';
  const IMAGE_BASE = 'images/';
  const PART_INFO = {
    'A': { icon: '🌫️', className: 'block-part-A' },
    'B': { icon: '🌊', className: 'block-part-B' },
    'C': { icon: '⛰️', className: 'block-part-C' },
    'D': { icon: '🌌', className: 'block-part-D' }
  };
  let currentStudent = null, allQuestions = [], currentPart = null, currentConcept = null;
  let quizQuestions = [], currentIndex = 0, correctCount = 0;

  async function apiCall(params) {
    const url = API_URL + '?' + new URLSearchParams(params).toString();
    const response = await fetch(url);
    return await response.json();
  }
  function showScreen(id) {
    ['loginScreen', 'partScreen', 'conceptScreen', 'quizScreen', 'resultScreen']
      .forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  async function login() {
    const id = document.getElementById('studentIdInput').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!id) { msg.textContent = '학번을 입력해주세요'; msg.className = 'msg error'; return; }
    msg.textContent = '확인 중...'; msg.className = 'msg';
    try {
      const result = await apiCall({ action: 'login', studentId: id });
      if (result.status === 'ok') {
        currentStudent = result;
        document.getElementById('studentName').textContent = result.이름;
        await loadQuestions();
        showScreen('partScreen');
      } else {
        msg.textContent = '❌ ' + result.message;
        msg.className = 'msg error';
      }
    } catch (err) {
      msg.textContent = '⚠️ 서버 연결 실패';
      msg.className = 'msg error';
    }
  }
  function logout() {
    currentStudent = null; allQuestions = [];
    document.getElementById('studentIdInput').value = '';
    document.getElementById('loginMsg').textContent = '';
    showScreen('loginScreen');
  }
  async function loadQuestions() {
    const result = await apiCall({ action: 'getQuestions' });
    if (result.status === 'ok') {
      allQuestions = result.data.filter(q => q.문제ID);
      renderPartGrid();
    }
  }
  function renderPartGrid() {
    const grid = document.getElementById('partGrid');
    grid.innerHTML = '';
    const parts = [...new Set(allQuestions.map(q => q.대단원))].filter(Boolean).sort();
    if (parts.length === 0) {
      grid.innerHTML = '<div class="empty-state">아직 문제가 없어요</div>';
      return;
    }
    parts.forEach(partName => {
      const partQuestions = allQuestions.filter(q => q.대단원 === partName);
      const code = (partQuestions[0].문제ID || '').charAt(0).toUpperCase();
      const info = PART_INFO[code] || { icon: '📘', className: '' };
      const block = document.createElement('div');
      block.className = 'block ' + info.className;
      block.innerHTML = `
        <div class="block-icon">${info.icon}</div>
        <div class="block-title">${partName}</div>
        <div class="block-count">${partQuestions.length}문제</div>`;
      block.onclick = () => selectPart(partName);
      grid.appendChild(block);
    });
  }
  function goToPartScreen() {
    currentPart = null; currentConcept = null;
    showScreen('partScreen');
  }
  function selectPart(partName) {
    currentPart = partName;
    document.getElementById('conceptScreenTitle').textContent = partName;
    renderConceptGrid();
    showScreen('conceptScreen');
  }
  function renderConceptGrid() {
    const grid = document.getElementById('conceptGrid');
    grid.innerHTML = '';
    const partQs = allQuestions.filter(q => q.대단원 === currentPart);
    const concepts = [...new Set(partQs.map(q => q.관련개념))].filter(Boolean);
    concepts.sort((a, b) => String(a).localeCompare(String(b), 'ko'));
    if (concepts.length === 0) {
      grid.innerHTML = '<div class="empty-state">아직 개념이 등록되지 않았어요</div>';
      return;
    }
    concepts.forEach(concept => {
      const cQs = partQs.filter(q => q.관련개념 === concept);
      const block = document.createElement('div');
      block.className = 'block';
      block.innerHTML = `
        <div class="block-title">${concept}</div>
        <div class="block-count">${cQs.length}문제</div>`;
      block.onclick = () => startQuiz(concept);
      grid.appendChild(block);
    });
  }
  function startQuiz(concept) {
    currentConcept = concept;
    const qs = allQuestions.filter(q => q.대단원 === currentPart && q.관련개념 === concept);
    quizQuestions = shuffle(qs);
    currentIndex = 0; correctCount = 0;
    showScreen('quizScreen');
    showQuestion();
  }
  function retryQuiz() {
    if (currentPart && currentConcept) startQuiz(currentConcept);
    else goToPartScreen();
  }
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function showQuestion() {
    const q = quizQuestions[currentIndex];
    const total = quizQuestions.length;
    const num = currentIndex + 1;
    document.getElementById('progressText').textContent = `${num} / ${total}`;
    document.getElementById('scoreText').textContent = `맞힌 개수: ${correctCount}`;
    document.getElementById('progressFill').style.width = `${(num / total) * 100}%`;
    document.getElementById('subUnitText').textContent = 
      `${q.중단원 || ''}${q.소단원 ? ' › ' + q.소단원 : ''}`;
    document.getElementById('conceptText').textContent = '💡 ' + (q.관련개념 || '');
    const img = document.getElementById('questionImg');
    let src = q.문제그림URL;
    if (src) {
      if (!src.startsWith('http') && !src.startsWith('images/')) src = IMAGE_BASE + src;
      img.src = src;
      img.classList.remove('hidden');
    } else if (q.문제ID) {
      img.src = IMAGE_BASE + q.문제ID + '.png';
      img.classList.remove('hidden');
    } else {
      img.classList.add('hidden');
    }
    const area = document.getElementById('quizArea');
    area.innerHTML = '';
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'answerInput';
    input.placeholder = '정답을 입력하세요 (예: 9.8 또는 ㄱㄴㄷ)';
    input.onkeypress = (e) => { if (e.key === 'Enter') submitAnswer(); };
    area.appendChild(input);
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = '제출';
    btn.onclick = submitAnswer;
    area.appendChild(btn);
    document.getElementById('resultMsg').innerHTML = '';
    document.getElementById('nextBtn').classList.add('hidden');
    setTimeout(() => input.focus(), 200);
  }
  function normalize(s) {
    if (s === null || s === undefined) return '';
    return String(s).trim().replace(/\s+/g, '').toLowerCase();
  }
  function normalizeForKor(s) {
    let str = normalize(s);
    if (/^[ㄱ-ㅎ]+$/.test(str)) return str.split('').sort().join('');
    return str;
  }
  function checkCorrect(studentAns, correctAns) {
    const sAns = normalizeForKor(studentAns);
    const candidates = String(correctAns).split('|').map(s => normalizeForKor(s));
    return candidates.includes(sAns);
  }
  async function submitAnswer() {
    const input = document.getElementById('answerInput');
    const answer = input.value.trim();
    if (!answer) return;
    const q = quizQuestions[currentIndex];
    const isCorrect = checkCorrect(answer, q.정답);
    if (isCorrect) correctCount++;
    document.getElementById('scoreText').textContent = `맞힌 개수: ${correctCount}`;
    const msgEl = document.getElementById('resultMsg');
    if (isCorrect) {
      msgEl.innerHTML = `<div class="result-msg result-correct">
        <span class="result-icon">✓</span> 정답이에요!
        ${q.해설 ? `<div class="explanation">${q.해설}</div>` : ''}</div>`;
    } else {
      msgEl.innerHTML = `<div class="result-msg result-wrong">
        <span class="result-icon">✗</span> 아쉬워요. 정답: <strong>${q.정답}</strong>
        ${q.해설 ? `<div class="explanation">${q.해설}</div>` : ''}</div>`;
    }
    apiCall({
      action: 'saveAnswer',
      학번: currentStudent.학번,
      이름: currentStudent.이름,
      문제ID: q.문제ID,
      학생답안: answer,
      정답여부: isCorrect ? 'true' : 'false'
    }).catch(err => console.error('저장 실패:', err));
    input.disabled = true;
    document.querySelectorAll('#quizArea button').forEach(b => b.disabled = true);
    if (currentIndex < quizQuestions.length - 1) {
      document.getElementById('nextBtn').classList.remove('hidden');
    } else {
      setTimeout(showResult, 1500);
    }
  }
  function nextQuestion() {
    currentIndex++;
    showQuestion();
  }
  function showResult() {
    document.getElementById('scoreNum').textContent = correctCount;
    document.getElementById('totalNum').textContent = quizQuestions.length;
    const pct = Math.round((correctCount / quizQuestions.length) * 100);
    let comment = '';
    if (pct === 100) comment = '🌟 완벽해요!';
    else if (pct >= 80) comment = '👏 잘했어요!';
    else if (pct >= 60) comment = '💪 조금만 더!';
    else comment = '📚 다시 한번 풀어볼까요?';
    document.getElementById('scorePercent').textContent = `${pct}% · ${comment}`;
    showScreen('resultScreen');
  }
  function quitQuiz() {
    if (currentIndex > 0 || correctCount > 0) {
      if (!confirm('정말 그만 푸시겠어요?')) return;
    }
    goToPartScreen();
  }
</script>
</body>
</html>
